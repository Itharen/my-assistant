# `packages: []` REQUIRED — pnpm@9 (Path B Dockerfile) a workspace.yaml-t
# workspace-deklaraciokent kezeli es `packages:` mezot kovetel (kulonben:
# "packages field missing or empty"). Ures tomb = settings-only workspace.
packages: []

minimumReleaseAgeExclude:
  # `@futdevpro/*` wildcard — KOTELEZO workspace-global szabaly: a sajat bedrock
  # package-jeink (Dynamo + FDP Templates) SOHA ne essenek a minimumReleaseAge
  # (supply-chain "cooldown") gate ala. Pinned-verzios lista minden friss
  # bedrock-bump-ot blokkol a runner install-ben (`pnpm i` exit 1 -> install step
  # fail), es karbantartas-igenyes. A wildcard minden @futdevpro/* verziot kizar.
  - '@futdevpro/*'
